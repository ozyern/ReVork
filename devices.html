<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

  <link rel="icon" href="assets/favicon.png">
  <link href="https://db.onlinewebfonts.com/c/1a5a02144883150dce30ae0877cfb513?family=Haverbrooke" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    /* ===== BASE ===== */
    body {
      background: #000;
      color: #fff;
      font-family: "Haverbrooke", "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== HERO ===== */
    .devices-hero {
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .bg-text {
      position: absolute;
      font-size: 12vw;
      font-weight: 900;
      letter-spacing: -10px;
      font-family: "Haverbrooke", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.18),
        rgba(255,255,255,0.02)
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      text-align: center;
      z-index: 2;
    }

    .hero-line {
      font-size: 15px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }

    .hero-content h2 {
      font-weight: 500;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .hero-content p {
      opacity: 0.6;
      font-size: 14px;
    }

    /* ===== SCROLL DOWN ANIMATION ===== */
    .scroll-down {
      position: fixed;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      z-index: 50;
    }

    .scroll-down.hidden {
      display: none;
    }

    .scroll-arrow {
      width: 24px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-arrow::after {
      content: '';
      width: 2px;
      height: 8px;
      background: rgba(255,255,255,0.8);
      border-radius: 2px;
      animation: scrollBounce 2s infinite;
    }

    @keyframes scrollBounce {
      0% {
        transform: translateY(-6px);
        opacity: 1;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(6px);
        opacity: 0;
      }
    }

    .scroll-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      opacity: 0.7;
    }

    /* ===== DEVICES ===== */
    .devices {
      max-width: 1300px;
      margin: 0 auto;
      padding: 120px 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 80px;
    }

    .device-card {
      background: linear-gradient(180deg, #0b0b10, #060608);
      border-radius: 28px;
      padding: 60px 40px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.4s ease;
    }

    .device-card:hover {
      transform: translateY(-10px);
      border-color: rgba(255,255,255,0.2);
    }

    .device-card img {
      height: 340px;
      object-fit: contain;
      margin-bottom: 40px;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
    }

    .device-card h3 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.8px;
    }

    .device-card a {
      display: inline-block;
      background: white;
      color: black;
      border: none;
      padding: 14px 44px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      font-family: "Haverbrooke", "Helvetica Neue", Arial, sans-serif;
    }

    .device-card a:hover {
      transform: scale(1.06);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 900px) {
      .devices {
        grid-template-columns: 1fr;
        gap: 60px;
        padding: 80px 20px;
      }

      .device-card img {
        height: 280px;
      }

      .scroll-down {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .devices-hero {
        height: 80vh;
      }

      .bg-text {
        font-size: 20vw;
      }

      .hero-line {
        font-size: 12px;
      }
    }
  </style>
</head>

<script>
// Hide scroll indicator when user scrolls
function handleScrollIndicator() {
  const indicator = document.getElementById('scrollDown');
  
  window.addEventListener('scroll', () => {
    if (window.scrollY > 100) {
      indicator.classList.add('hidden');
    } else {
      indicator.classList.remove('hidden');
    }
  });
}

// Initialize on page load
window.addEventListener('load', handleScrollIndicator);
</script>
